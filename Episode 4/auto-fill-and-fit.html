<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#3 Css Grid | Auto-Fill & Auto Fit</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #ddd;
        }

        .container {
            width: 60%;
            margin: 50px auto;
            border: 5px solid black;
            display: grid;
            /* auto fit / auto fill */
            /* Auto Fit Gridnya secara explisit berakhir di akhir element */
            /* Auto Fill Menentkan akhir dari gridnya diukuran yang sekiranya pas di isi content sebesar 100px */
            grid-template-columns: repeat(auto-fit, 100px);
        }

        .item {
            background-color: aquamarine;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .item:nth-child(even) {
            background-color: pink;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>

        <div class="item">5</div>

</body>
</html>
